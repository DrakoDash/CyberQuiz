<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>CyberQuiz</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">

<style>
:root{
  --bg:#0a0f24;
  --card:#111833;
  --accent:#00bfff;
  --accent-2:#4cc9f0;
  --muted:rgba(255,255,255,0.85);
  --success:#7efc6a;
}

html,body{
  height:100%;
  margin:0;
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:#fff;
  overflow-x:hidden;
}

.navbar{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(10,15,36,0.85);
  backdrop-filter:blur(6px);
  border-bottom:2px solid var(--accent);
  padding:12px 25px;
  display:flex;
  align-items:center;
  gap:12px;
  z-index:999;
  box-sizing:border-box;
}

.back-quiz{
  background:transparent;
  border:none;
  color:var(--accent);
  font-size:1rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
}

main{
  padding:100px 20px 60px;
  max-width:900px;
  margin:0 auto;
}

.quiz-card{
  background:linear-gradient(180deg, rgba(17,24,51,0.95), rgba(13,19,43,0.85));
  border:1px solid rgba(0,191,255,0.12);
  border-radius:14px;
  padding:28px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.quiz-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:18px;
}

.progress{
  height:10px;
  background:rgba(255,255,255,0.06);
  border-radius:999px;
  overflow:hidden;
  flex:1;
  margin-left:16px;
}

.progress > i{
  display:block;
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent-2));
  transition:width .35s ease;
}

.question{
  font-size:1.15rem;
  margin:18px 0;
  color:var(--muted);
  line-height:1.5;
}

.answers{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.answer-btn{
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(0,191,255,0.08);
  color:#fff;
  padding:14px;
  border-radius:10px;
  text-align:left;
  cursor:pointer;
  transition:all .2s;
  min-height:60px;
}

.answer-btn:hover{
  background:rgba(22,32,74,0.95);
  transform:translateX(5px);
}

.answer-btn.selected{
  background:var(--accent);
  color:#001;
  font-weight:600;
}

.controls{
  display:flex;
  gap:12px;
  margin-top:25px;
}

.btn{
  padding:12px 20px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:600;
  transition:opacity 0.2s;
}

.btn:disabled{
  opacity:0.3;
  cursor:not-allowed;
}

.btn-primary{
  background:var(--accent);
  color:#001;
  flex:1;
}

.btn-ghost{
  background:transparent;
  border:1px solid rgba(255,255,255,0.1);
  color:var(--muted);
}

.correction-item{
  background:rgba(255,255,255,0.03);
  padding:15px;
  border-radius:10px;
  margin-bottom:12px;
  border-left:4px solid var(--accent);
}
</style>
</head>

<body>

<nav class="navbar">
  <button class="back-quiz">
    <i class="fa-solid fa-arrow-left"></i>
    Retour
  </button>

  <div style="font-weight:600;color:var(--accent)">
    CyberQuiz
  </div>
</nav>

<main>

<div class="quiz-card">

<div class="quiz-header">

<div style="display:flex;flex-direction:column;gap:5px;">
  <h2 class="quiz-title" style="color:var(--accent);margin:0;font-size:1.3rem;">
    Bonnes Pratiques
  </h2>

  <span id="questionCounter" style="font-size:0.95rem;color:var(--muted)">
    Question 1 / 20
  </span>
</div>

<div class="progress">
  <i></i>
</div>

</div>

<div id="quizStep">

<div class="question" id="qText"></div>

<div class="answers" id="ansBox"></div>

<div class="controls">
  <button class="btn btn-ghost" id="pBtn" disabled>
    Précédent
  </button>

  <button class="btn btn-primary" id="nBtn" disabled>
    Suivant
  </button>
</div>

</div>

<div id="resultStep" style="display:none;text-align:center;">
  <p>Votre score final :</p>

  <h2 id="finalScore"
      style="font-size:3rem;color:var(--accent);margin:10px 0;">
      0/20
  </h2>

  <div style="display:flex;flex-direction:column;gap:10px;">
    <button class="btn btn-primary" id="showCorr">
      Voir la correction détaillée
    </button>
  </div>
</div>

<div id="corrStep" style="display:none;">
  <h3 style="color:var(--accent)">
    Analyse de vos réponses
  </h3>

  <div id="corrList"
       style="max-height:450px;overflow-y:auto;padding-right:10px;">
  </div>
</div>

</div>

</main>

<script>

const questions = [

{q:"Vous recevez un email très urgent de votre banque demandant vos codes. Que faites-vous ?",a:["Je réponds immédiatement","Je vérifie l'expéditeur et contacte la banque","Je clique sur le lien"],c:1,e:"Les banques ne demandent jamais vos codes par email."},

{q:"Que signifie l'absence de HTTPS ?",a:["Le site est plus rapide","Les données ne sont pas sécurisées","Le site est certifié"],c:1,e:"Sans HTTPS les données peuvent être interceptées."},

{q:"Un ami envoie un lien étrange sur Messenger. Que faire ?",a:["Je clique","Je lui demande confirmation","Je partage le lien"],c:1,e:"Son compte peut être piraté."},

{q:"Quel est le levier principal du phishing ?",a:["Le stress et l'urgence","Les cadeaux","Les longs textes"],c:0,e:"Le phishing pousse à agir sans réfléchir."},

{q:"Télécharger un film en .exe est-il risqué ?",a:["Non","Oui c'est probablement un virus","C'est plus rapide"],c:1,e:"Un .exe est un programme exécutable."},

{q:"Vous gagnez un iPhone gratuitement. Que penser ?",a:["C'est fiable","C'est une arnaque","C'est normal"],c:1,e:"Si c'est trop beau pour être vrai, méfiance."},

{q:"Vous trouvez une clé USB inconnue. Que faire ?",a:["La brancher","La donner au service informatique","L'utiliser"],c:1,e:"Une clé inconnue peut infecter votre PC."},

{q:"Quel danger présente le smishing ?",a:["Aucun","Vol de données bancaires","Simple publicité"],c:1,e:"Le smishing est du phishing par SMS."},

{q:"Pourquoi éviter les Wi-Fi publics pour les achats ?",a:["Connexion lente","Des pirates peuvent intercepter vos données","La banque refuse"],c:1,e:"Les réseaux publics sont risqués."},

{q:"À quoi servent les mises à jour de sécurité ?",a:["Changer l'apparence","Corriger des failles","Ralentir l'appareil"],c:1,e:"Les mises à jour corrigent les vulnérabilités."},

{q:"Votre ordinateur demande 300€ pour débloquer vos fichiers. Que se passe-t-il ?",a:["Une amende","Un ransomware","Une publicité"],c:1,e:"Un ransomware chiffre les fichiers."},

{q:"Comment reconnaître un lien frauduleux ?",a:["L'URL est suspecte","Le texte est rouge","Le lien est court"],c:0,e:"Toujours vérifier l'adresse réelle."},

{q:"Un acheteur demande une photo de votre carte bancaire. Que faire ?",a:["L'envoyer","Refuser","Cacher le code"],c:1,e:"C'est une tentative de fraude."},

{q:"Qu'est-ce que l'usurpation d'identité numérique ?",a:["Changer de pseudo","Utiliser vos données volées","Changer de photo"],c:1,e:"Les fraudeurs se font passer pour vous."},

{q:"Pourquoi avoir un antivirus à jour ?",a:["Obligation","Bloquer les menaces","Décoration"],c:1,e:"Il détecte les logiciels malveillants."},

{q:"Pourquoi utiliser un mot de passe différent partout ?",a:["Internet plus rapide","Limiter les dégâts d'un piratage","Obligation"],c:1,e:"Un mot de passe unique protège vos autres comptes."},

{q:"Quel est le rôle du 2FA ?",a:["Ajouter une sécurité supplémentaire","Raccourcir le mot de passe","Accélérer Internet"],c:0,e:"Le 2FA protège même si le mot de passe fuit."},

{q:"Un site demande un codec vidéo spécial. Que faire ?",a:["Le télécharger","Quitter le site","Désactiver l'antivirus"],c:1,e:"Les faux codecs installent souvent des virus."},

{q:"Que faire avant de vendre son smartphone ?",a:["Supprimer quelques photos","Réinitialiser complètement","Retirer la SIM"],c:1,e:"Il faut effacer toutes vos données."},

{q:"Pourquoi éviter de trop publier sur les réseaux sociaux ?",a:["Cela ralentit Internet","Les fraudeurs exploitent ces infos","C'est interdit"],c:1,e:"Les pirates utilisent les infos publiques."}

];

let cur = 0;

let userAns = new Array(questions.length).fill(null);

const qT = document.getElementById('qText');
const aB = document.getElementById('ansBox');
const nB = document.getElementById('nBtn');
const pB = document.getElementById('pBtn');
const pI = document.querySelector('.progress i');
const qCounter = document.getElementById('questionCounter');

function showQ(){

  const q = questions[cur];

  qCounter.textContent =
    `Question ${cur + 1} / ${questions.length}`;

  qT.innerHTML =
    `<strong>Question ${cur + 1} :</strong> ${q.q}`;

  aB.innerHTML = '';

  nB.disabled = userAns[cur] === null;

  pB.disabled = cur === 0;

  nB.textContent =
    cur === questions.length - 1
    ? "Terminer"
    : "Suivant";

  q.a.forEach((ans,i)=>{

    const b = document.createElement('button');

    b.className =
      'answer-btn' +
      (userAns[cur]===i ? ' selected' : '');

    b.textContent = ans;

    b.onclick = ()=>{

      document
        .querySelectorAll('.answer-btn')
        .forEach(x=>x.classList.remove('selected'));

      b.classList.add('selected');

      userAns[cur] = i;

      nB.disabled = false;
    };

    aB.appendChild(b);
  });

  pI.style.width =
    ((cur + 1) / questions.length * 100) + '%';
}

nB.onclick = ()=>{

  if(cur < questions.length - 1){

    cur++;

    showQ();

  }else{

    endQuiz();
  }
};

pB.onclick = ()=>{

  cur--;

  showQ();
};

function endQuiz(){

  document.getElementById('quizStep').style.display='none';

  document.getElementById('resultStep').style.display='block';

  let s = 0;

  userAns.forEach((a,i)=>{

    if(a === questions[i].c) s++;
  });

  document.getElementById('finalScore').textContent =
    `${s} / ${questions.length}`;
}

document.getElementById('showCorr').onclick = ()=>{

  document.getElementById('resultStep').style.display='none';

  document.getElementById('corrStep').style.display='block';

  const list = document.getElementById('corrList');

  list.innerHTML = '';

  questions.forEach((q,i)=>{

    const ok = userAns[i] === q.c;

    list.innerHTML += `
      <div class="correction-item">

      <p>
      <strong>${i+1}. ${q.q}</strong>
      </p>

      <p>
      Réponse :
      <span style="color:${ok ? 'var(--success)' : '#ff7b7b'}">
      ${q.a[userAns[i]]}
      </span>

      ${ok ? '' :
      '<br>Bonne réponse : <b>'+q.a[q.c]+'</b>'}
      </p>

      <p style="font-size:0.9rem;color:var(--muted);font-style:italic">
      ${q.e}
      </p>

      </div>
    `;
  });
};

showQ();

</script>

</body>
</html>
