<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Bonnes Pratiques — CyberQuiz</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"/>
<style>
:root {
  --bg: #060f14;
  --card: #0a1820;
  --accent: #00d4aa;
  --accent2: #4cc9f0;
  --glow: rgba(0,212,170,0.15);
  --border: rgba(0,212,170,0.18);
  --muted: rgba(255,255,255,0.68);
  --success: #4dff91;
  --fail: #ff5555;
  --text: #e0f7f4;
}

*, *::before, *::after { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0; min-height: 100%;
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* ── PARTICLES ─────────────────────── */
#particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ── NAVBAR ─────────────────────────── */
.navbar {
  position: fixed; top: 0; left: 0; right: 0;
  background: rgba(6,15,20,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 900;
}

.nav-back {
  background: none; border: 1px solid var(--border); cursor: pointer;
  color: var(--accent); font-size: 0.9rem;
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 8px;
  transition: background 0.2s;
  font-family: 'Poppins', sans-serif;
}
.nav-back:hover { background: var(--glow); }

.nav-logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem; color: var(--accent); letter-spacing: 2px;
}

.nav-badge {
  font-size: 0.75rem; color: var(--muted);
  background: rgba(0,212,170,0.07);
  border: 1px solid var(--border);
  padding: 4px 10px; border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
}

/* ── MAIN ───────────────────────────── */
main {
  position: relative; z-index: 1;
  padding: 82px 16px 60px;
  max-width: 820px; margin: 0 auto;
}

/* ── QUIZ CARD ──────────────────────── */
.quiz-card {
  background: linear-gradient(160deg, rgba(10,24,32,0.98), rgba(6,14,20,0.98));
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 60px rgba(0,212,170,0.06), 0 20px 40px rgba(0,0,0,0.5);
}

/* ── HERO BANNER ────────────────────── */
.quiz-hero {
  background: linear-gradient(120deg, rgba(0,212,170,0.09) 0%, rgba(76,201,240,0.05) 100%);
  border-bottom: 1px solid var(--border);
  padding: 28px 32px 22px;
  display: flex; align-items: center; gap: 20px;
}

.hero-icon {
  width: 58px; height: 58px; flex-shrink: 0;
  background: linear-gradient(135deg, rgba(0,212,170,0.15), rgba(76,201,240,0.08));
  border: 1px solid rgba(0,212,170,0.3);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem;
}

.hero-text h1 {
  margin: 0 0 4px;
  font-size: 1.35rem; font-weight: 700;
  color: #fff;
}

.hero-text p {
  margin: 0;
  font-size: 0.82rem; color: var(--muted); line-height: 1.4;
}

.hero-label {
  display: inline-block; margin-bottom: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent); background: rgba(0,212,170,0.08);
  border: 1px solid rgba(0,212,170,0.25);
  padding: 2px 8px; border-radius: 4px;
}

/* ── PROGRESS ───────────────────────── */
.progress-zone {
  padding: 16px 32px 0;
  display: flex; align-items: center; gap: 14px;
}

.progress-bar {
  flex: 1; height: 6px;
  background: rgba(255,255,255,0.05);
  border-radius: 99px; overflow: hidden;
}

.progress-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 99px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 8px rgba(0,212,170,0.5);
}

.progress-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem; color: var(--muted); white-space: nowrap;
}

/* ── QUIZ BODY ──────────────────────── */
.quiz-body { padding: 28px 32px 32px; }

.question-meta {
  display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
}

.q-number {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase;
  color: var(--accent); background: rgba(0,212,170,0.08);
  border: 1px solid rgba(0,212,170,0.2);
  padding: 3px 10px; border-radius: 5px;
}

.question-text {
  font-size: 1.1rem; font-weight: 500; line-height: 1.65;
  color: #f0fffe; margin: 0 0 24px;
}

/* ── ANSWERS ────────────────────────── */
.answers { display: flex; flex-direction: column; gap: 10px; }

.answer-btn {
  display: flex; align-items: center; gap: 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px; padding: 14px 16px;
  cursor: pointer; text-align: left;
  transition: all 0.18s ease;
  color: var(--text); font-family: 'Poppins', sans-serif; font-size: 0.92rem;
}

.answer-btn:hover {
  background: rgba(0,212,170,0.07);
  border-color: rgba(0,212,170,0.3);
  transform: translateX(4px);
}

.answer-badge {
  min-width: 32px; height: 32px; border-radius: 8px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; font-weight: 600; color: var(--muted);
  transition: all 0.18s ease; flex-shrink: 0;
}

.answer-btn.selected {
  background: rgba(0,212,170,0.1);
  border-color: var(--accent);
  box-shadow: 0 0 0 1px rgba(0,212,170,0.2);
}

.answer-btn.selected .answer-badge {
  background: var(--accent);
  border-color: var(--accent);
  color: #001a14;
}

/* ── CONTROLS ───────────────────────── */
.controls {
  display: flex; gap: 12px; margin-top: 28px;
}

.btn {
  padding: 12px 20px; border-radius: 10px; border: none;
  cursor: pointer; font-weight: 600; font-size: 0.9rem;
  font-family: 'Poppins', sans-serif;
  transition: all 0.2s ease;
}

.btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #001a14; flex: 1;
  box-shadow: 0 4px 15px rgba(0,212,170,0.25);
}
.btn-primary:not(:disabled):hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,212,170,0.35);
}

.btn-ghost {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--muted);
}
.btn-ghost:not(:disabled):hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(255,255,255,0.2);
}

/* ── RESULT SCREEN ──────────────────── */
#resultStep { display: none; text-align: center; padding: 10px 0 6px; }

.score-ring {
  position: relative; width: 130px; height: 130px;
  margin: 0 auto 20px;
}

.score-ring svg { transform: rotate(-90deg); }
.score-ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 8; }

.score-ring-fill {
  fill: none; stroke-width: 8; stroke-linecap: round;
  stroke: var(--accent);
  stroke-dasharray: 345;
  stroke-dashoffset: 345;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  filter: drop-shadow(0 0 6px rgba(0,212,170,0.5));
}

.score-ring-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}

.score-number {
  font-size: 2rem; font-weight: 700; color: #fff;
  font-family: 'JetBrains Mono', monospace; line-height: 1;
}

.score-total { font-size: 0.75rem; color: var(--muted); }
.score-msg { font-size: 1.1rem; font-weight: 600; margin-bottom: 6px; }
.score-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 24px; }

.result-actions {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
}

/* ── CORRECTION SCREEN ──────────────── */
#corrStep { display: none; }

.corr-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
}

.corr-header h3 { margin: 0; font-size: 1.1rem; color: #fff; }

.corr-list {
  max-height: 440px; overflow-y: auto;
  padding-right: 6px; display: flex; flex-direction: column; gap: 10px;
}

.corr-list::-webkit-scrollbar { width: 4px; }
.corr-list::-webkit-scrollbar-track { background: transparent; }
.corr-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.corr-item {
  background: rgba(255,255,255,0.03);
  border-radius: 12px; padding: 16px;
  border-left: 3px solid transparent;
}

.corr-item.ok { border-left-color: var(--success); }
.corr-item.ko { border-left-color: var(--fail); }

.corr-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; margin-bottom: 10px;
}

.corr-q { font-size: 0.88rem; font-weight: 500; color: #f0fffe; line-height: 1.4; }

.corr-status {
  font-size: 0.72rem; font-weight: 600; white-space: nowrap;
  padding: 3px 8px; border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
}

.corr-status.ok { background: rgba(77,255,145,0.1); color: var(--success); }
.corr-status.ko { background: rgba(255,85,85,0.1); color: var(--fail); }

.corr-answers { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
.corr-answers strong { color: #fff; }

.corr-expl {
  margin-top: 8px; font-size: 0.8rem;
  color: rgba(0,212,170,0.8);
  font-style: italic; line-height: 1.5;
  padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.05);
}

.corr-footer { display: flex; gap: 10px; margin-top: 18px; }

/* ── MODAL ──────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 1200;
}

.modal {
  background: #0a1820;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 24px; width: 320px; text-align: center;
  box-shadow: 0 0 40px rgba(0,212,170,0.08);
}

.modal h4 { margin: 0 0 10px; font-size: 1.05rem; color: #fff; }
.modal p { margin: 0 0 22px; font-size: 0.88rem; color: var(--muted); }
.modal-actions { display: flex; gap: 10px; }

/* ── RESPONSIVE ─────────────────────── */
@media (max-width: 600px) {
  .quiz-hero { padding: 20px 20px 16px; gap: 14px; }
  .quiz-body { padding: 20px 20px 24px; }
  .progress-zone { padding: 14px 20px 0; }
  .hero-text h1 { font-size: 1.1rem; }
  .hero-icon { width: 48px; height: 48px; font-size: 1.4rem; border-radius: 10px; }
  .question-text { font-size: 1rem; }
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- NAVBAR -->
<nav class="navbar">
  <button class="nav-back" id="backBtn">
    <i class="fa-solid fa-arrow-left"></i> Retour
  </button>
  <div class="nav-logo">CYBER<span style="opacity:.4">QUIZ</span></div>
  <div class="nav-badge"><i class="fa-solid fa-lock" style="margin-right:5px"></i>Niveau 3</div>
</nav>

<!-- MAIN -->
<main>
  <div class="quiz-card">

    <!-- HERO -->
    <div class="quiz-hero">
      <div class="hero-icon">🛡️</div>
      <div class="hero-text">
        <div class="hero-label">Module 03</div>
        <h1>Bonnes Pratiques</h1>
        <p>Mots de passe, mises à jour, Wi-Fi, sauvegardes… Adopte les bons réflexes pour te protéger au quotidien.</p>
      </div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-zone">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label" id="progressLabel">0 / 15</div>
    </div>

    <!-- QUIZ STEP -->
    <div class="quiz-body" id="quizStep">
      <div class="question-meta">
        <span class="q-number" id="qNumber">Question 01</span>
      </div>
      <div class="question-text" id="qText"></div>
      <div class="answers" id="ansBox"></div>
      <div class="controls">
        <button class="btn btn-ghost" id="prevBtn" disabled>
          <i class="fa-solid fa-chevron-left"></i> Précédent
        </button>
        <button class="btn btn-primary" id="nextBtn" disabled>
          Suivant <i class="fa-solid fa-chevron-right"></i>
        </button>
      </div>
    </div>

    <!-- RESULT STEP -->
    <div class="quiz-body" id="resultStep">
      <div class="score-ring">
        <svg width="130" height="130" viewBox="0 0 130 130">
          <circle class="score-ring-track" cx="65" cy="65" r="55"/>
          <circle class="score-ring-fill" id="ringFill" cx="65" cy="65" r="55"/>
        </svg>
        <div class="score-ring-text">
          <div class="score-number" id="scoreNum">0</div>
          <div class="score-total" id="scoreTotal">/ 15</div>
        </div>
      </div>
      <div class="score-msg" id="scoreMsg"></div>
      <div class="score-sub" id="scoreSub"></div>
      <div class="result-actions">
        <button class="btn btn-ghost" id="showCorrBtn">
          <i class="fa-solid fa-list-check"></i> Voir la correction
        </button>
        <button class="btn btn-primary" id="goHomeBtn">
          <i class="fa-solid fa-house"></i> Accueil
        </button>
      </div>
    </div>

    <!-- CORRECTION STEP -->
    <div class="quiz-body" id="corrStep">
      <div class="corr-header">
        <i class="fa-solid fa-magnifying-glass" style="color:var(--accent)"></i>
        <h3>Correction détaillée</h3>
      </div>
      <div class="corr-list" id="corrList"></div>
      <div class="corr-footer">
        <button class="btn btn-ghost" id="backToResultBtn">
          <i class="fa-solid fa-arrow-left"></i> Score
        </button>
        <button class="btn btn-primary" id="goHomeBtn2">
          <i class="fa-solid fa-house"></i> Accueil
        </button>
      </div>
    </div>

  </div>
</main>

<!-- QUIT MODAL -->
<div id="quitModal" style="display:none">
  <div class="modal-backdrop">
    <div class="modal">
      <h4>🛡️ Quitter le quiz ?</h4>
      <p>Ta progression sera perdue. Tu es sûr ?</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancelQuit" style="flex:1">Rester</button>
        <button class="btn btn-primary" id="confirmQuit" style="flex:1">Quitter</button>
      </div>
    </div>
  </div>
</div>

<script>
/* ── QUESTIONS ──────────────────────── */
const questions = [
  { q: "Quelle est la méthode la plus sûre pour gérer de nombreux mots de passe ?", a: ["Utiliser le même mot de passe pour simplifier","Utiliser un mot de passe unique, long et complexe par compte","Les noter dans un carnet papier à côté de l'ordinateur"], c: 1, e: "Un mot de passe unique par service évite qu'un seul piratage ne compromette tous vos comptes en cascade." },
  { q: "Avant de cliquer sur un lien reçu par message, quelle vérification est essentielle ?", a: ["Cliquer pour voir si le site semble normal","Vérifier l'expéditeur et survoler le lien pour voir l'URL réelle","Le partager avec vos amis pour avoir leur avis"], c: 1, e: "Les fraudeurs imitent l'apparence de sites officiels. Toujours vérifier l'adresse URL complète avant de cliquer." },
  { q: "Pourquoi installer les mises à jour dès qu'elles sont disponibles ?", a: ["C'est principalement pour changer le design du logiciel","Elles servent à supprimer les fichiers trop anciens","Elles corrigent des failles de sécurité exploitées par les pirates"], c: 2, e: "Les correctifs de sécurité sont votre première défense contre les nouvelles menaces. Un système non à jour est vulnérable." },
  { q: "Sur un Wi-Fi public (gare, café), quelle précaution prendre ?", a: ["Entrer librement vos coordonnées bancaires","Utiliser un VPN pour chiffrer votre connexion","Ne rien faire de spécial, ces réseaux sont sécurisés"], c: 1, e: "Un VPN crée un tunnel chiffré qui empêche les autres utilisateurs du réseau d'intercepter vos données." },
  { q: "Que faire face à un email suspect d'une administration demandant une action urgente ?", a: ["Signaler l'email comme tentative de phishing","Répondre pour demander s'il s'agit d'une erreur","Cliquer sur la pièce jointe pour vérifier les détails"], c: 0, e: "Les administrations ne demandent jamais d'informations sensibles ou de paiements urgents par simple email." },
  { q: "Pour protéger votre vie privée sur les réseaux sociaux, il est préférable de :", a: ["Partager votre localisation en temps réel","Limiter la visibilité de vos infos aux personnes que vous connaissez","Publier des photos de vos documents d'identité"], c: 1, e: "Moins vous exposez de données personnelles, moins vous donnez d'indices aux pirates pour vous cibler ou vous usurper." },
  { q: "Pourquoi verrouiller son écran même pour une courte absence ?", a: ["C'est uniquement pour l'apparence de l'écran d'accueil","Pour empêcher un accès physique direct à vos données privées","Cela sert principalement à économiser la batterie"], c: 1, e: "Un accès physique à votre appareil est souvent la méthode la plus rapide pour voler vos informations sensibles." },
  { q: "Meilleur réflexe si vous avez un doute sur la sécurité d'une application ?", a: ["Demander conseil à un expert ou faire une recherche en ligne","L'ignorer et continuer à l'utiliser normalement","La télécharger quand même pour tester ses fonctionnalités"], c: 0, e: "La prudence est la règle d'or en cybersécurité : en cas de doute, on ne télécharge pas et on vérifie d'abord." },
  { q: "À quoi servent principalement les sauvegardes régulières de vos données ?", a: ["À encombrer inutilement vos disques durs","À récupérer vos fichiers en cas de panne, vol ou cyberattaque","À supprimer automatiquement les fichiers les plus anciens"], c: 1, e: "La sauvegarde est votre seule garantie de ne pas tout perdre en cas de problème majeur (ransomware, panne, vol)." },
  { q: "Pour installer une nouvelle application sur mobile, vous devriez :", a: ["Prendre n'importe quel lien trouvé sur un blog","Utiliser exclusivement les stores officiels (Play Store, App Store)","Désactiver les protections pour faciliter l'installation"], c: 1, e: "Les stores officiels scannent les applications pour s'assurer qu'elles ne contiennent pas de malwares cachés." },
  { q: "Face à un pop-up indiquant que votre PC est infecté, que faire ?", a: ["Cliquer sur le bouton proposé pour nettoyer le PC","Fermer immédiatement la fenêtre sans rien télécharger","Donner ses informations pour recevoir de l'aide à distance"], c: 1, e: "Ces fenêtres pop-up sont presque toujours des pièges conçus pour vous faire installer de vrais virus." },
  { q: "Quel est le rôle principal d'un gestionnaire de mots de passe ?", a: ["Mémoriser tous vos codes à votre place","Créer, stocker et remplir automatiquement des mots de passe très complexes","Permettre de partager facilement ses codes avec des collègues"], c: 1, e: "Il vous permet d'avoir un mot de passe différent et complexe pour chaque service sans avoir besoin de les retenir." },
  { q: "Quand faut-il changer le mot de passe d'un compte important ?", a: ["Seulement une fois par an","Dès que vous soupçonnez une fuite de données ou un accès suspect","Il ne faut jamais le changer pour ne pas l'oublier"], c: 1, e: "Réagir vite après une faille de sécurité permet de bloquer l'accès aux attaquants avant qu'ils n'exploitent vos données." },
  { q: "Au travail, quel est le bon comportement vis-à-vis de votre session ?", a: ["Laisser son poste ouvert pour que les collègues puissent aider","Verrouiller systématiquement sa session dès que l'on quitte son bureau","Partager ses identifiants avec son binôme pour plus d'efficacité"], c: 1, e: "Votre identité numérique au travail engage votre responsabilité professionnelle et légale." },
  { q: "Si vous trouvez une clé USB inconnue sur un parking, que faites-vous ?", a: ["La brancher sur votre ordinateur par curiosité","La remettre au service informatique ou ne pas l'utiliser","La jeter directement à la poubelle sans réfléchir"], c: 1, e: "Une clé USB abandonnée est une technique classique (baiting) pour infiltrer un malware dans un réseau d'entreprise." }
];

/* ── STATE ──────────────────────────── */
let cur = 0;
const userAns = new Array(questions.length).fill(null);
const LABELS = ['A', 'B', 'C', 'D'];

/* ── ELEMENTS ───────────────────────── */
const quizStep   = document.getElementById('quizStep');
const resultStep = document.getElementById('resultStep');
const corrStep   = document.getElementById('corrStep');
const qText      = document.getElementById('qText');
const ansBox     = document.getElementById('ansBox');
const nextBtn    = document.getElementById('nextBtn');
const prevBtn    = document.getElementById('prevBtn');
const progressFill  = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const qNumber    = document.getElementById('qNumber');

/* ── RENDER QUESTION ────────────────── */
function renderQ() {
  const q = questions[cur];
  qNumber.textContent = `Question ${String(cur + 1).padStart(2, '0')}`;
  qText.textContent = q.q;
  ansBox.innerHTML = '';

  prevBtn.disabled = cur === 0;
  nextBtn.disabled = userAns[cur] === null;
  nextBtn.innerHTML = cur === questions.length - 1
    ? 'Terminer <i class="fa-solid fa-flag-checkered"></i>'
    : 'Suivant <i class="fa-solid fa-chevron-right"></i>';

  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn' + (userAns[cur] === i ? ' selected' : '');
    btn.innerHTML = `
      <div class="answer-badge">${LABELS[i]}</div>
      <span>${ans}</span>
    `;
    btn.onclick = () => {
      document.querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      userAns[cur] = i;
      nextBtn.disabled = false;
    };
    ansBox.appendChild(btn);
  });

  const pct = (cur / questions.length) * 100;
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `${cur} / ${questions.length}`;
}

/* ── NAVIGATION ─────────────────────── */
nextBtn.onclick = () => {
  if (cur < questions.length - 1) { cur++; renderQ(); }
  else showResults();
};

prevBtn.onclick = () => { if (cur > 0) { cur--; renderQ(); } };

/* ── RESULTS ────────────────────────── */
function showResults() {
  quizStep.style.display = 'none';
  resultStep.style.display = 'block';
  progressFill.style.width = '100%';
  progressLabel.textContent = `${questions.length} / ${questions.length}`;

  let score = 0;
  userAns.forEach((a, i) => { if (a === questions[i].c) score++; });
  const pct = Math.round((score / questions.length) * 100);

  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreTotal').textContent = `/ ${questions.length}`;

  const ring = document.getElementById('ringFill');
  const circ = 2 * Math.PI * 55;
  ring.style.strokeDasharray = circ;
  ring.style.strokeDashoffset = circ;
  setTimeout(() => {
    ring.style.strokeDashoffset = circ * (1 - pct / 100);
  }, 100);

  let msg, sub, color;
  if (pct >= 90)      { msg = '🏆 Excellent !';   sub = 'Tu appliques parfaitement les bonnes pratiques.'; color = '#4dff91'; }
  else if (pct >= 70) { msg = '🎯 Bien joué !';   sub = 'Encore quelques réflexes à consolider.'; color = '#00d4aa'; }
  else if (pct >= 50) { msg = '👍 Pas mal !';     sub = 'Revois les pratiques de gestion des mots de passe.'; color = '#ffd166'; }
  else                { msg = '📚 À revoir';      sub = 'Les bonnes pratiques cyber sont essentielles au quotidien.'; color = '#ff4444'; }

  ring.style.stroke = color;
  const msgEl = document.getElementById('scoreMsg');
  msgEl.textContent = msg;
  msgEl.style.color = color;
  document.getElementById('scoreSub').textContent = sub;
}

/* ── CORRECTION ─────────────────────── */
document.getElementById('showCorrBtn').onclick = () => {
  resultStep.style.display = 'none';
  corrStep.style.display = 'block';
  const list = document.getElementById('corrList');
  list.innerHTML = '';

  questions.forEach((q, i) => {
    const ok = userAns[i] === q.c;
    const chosen = userAns[i] !== null ? q.a[userAns[i]] : 'Aucune réponse';
    list.innerHTML += `
      <div class="corr-item ${ok ? 'ok' : 'ko'}">
        <div class="corr-top">
          <div class="corr-q"><strong>${i + 1}.</strong> ${q.q}</div>
          <span class="corr-status ${ok ? 'ok' : 'ko'}">${ok ? '✓ Correct' : '✗ Incorrect'}</span>
        </div>
        <div class="corr-answers">
          Ta réponse : <strong style="color:${ok ? 'var(--success)' : 'var(--fail)'}">${chosen}</strong>
          ${!ok ? `<br>Bonne réponse : <strong style="color:var(--success)">${q.a[q.c]}</strong>` : ''}
        </div>
        <div class="corr-expl"><i class="fa-solid fa-circle-info" style="margin-right:5px"></i>${q.e}</div>
      </div>
    `;
  });
};

document.getElementById('backToResultBtn').onclick = () => {
  corrStep.style.display = 'none';
  resultStep.style.display = 'block';
};

/* ── HOME & MODAL ───────────────────── */
const goHome = () => { window.location.href = 'accueil.html'; };
document.getElementById('goHomeBtn').onclick = goHome;
document.getElementById('goHomeBtn2').onclick = goHome;

document.getElementById('backBtn').onclick = () => {
  document.getElementById('quitModal').style.display = 'block';
};
document.getElementById('cancelQuit').onclick = () => {
  document.getElementById('quitModal').style.display = 'none';
};
document.getElementById('confirmQuit').onclick = goHome;

/* ── PARTICLES ──────────────────────── */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

class Particle {
  constructor() { this.reset(true); }
  reset(init = false) {
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : canvas.height + 5;
    this.size = Math.random() * 1.8 + 0.3;
    this.speedY = -(Math.random() * 0.4 + 0.1);
    this.speedX = (Math.random() - 0.5) * 0.2;
    this.opacity = Math.random() * 0.25 + 0.05;
    this.color = Math.random() > 0.5
      ? `rgba(0,212,170,${this.opacity})`
      : `rgba(76,201,240,${this.opacity})`;
  }
  update() {
    this.x += this.speedX; this.y += this.speedY;
    if (this.y < -5) this.reset();
  }
  draw() {
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color; ctx.fill();
  }
}

function initParticles() {
  particles = [];
  const n = Math.max(40, Math.floor(canvas.width * canvas.height / 18000));
  for (let i = 0; i < n; i++) particles.push(new Particle());
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}

window.addEventListener('resize', () => { resize(); initParticles(); });
resize(); initParticles(); animate();

/* ── INIT ───────────────────────────── */
renderQ();
</script>
